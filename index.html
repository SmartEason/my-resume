<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人簡介分流網頁</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desktop-view">
        <header>
            <h1>我的個人網站 (電腦版)</h1>
        </header>
        <main class="container">
            <section class="card">
                <h2>👤 個人簡介</h2>
                <p>我是李塬閎。目前就讀於朝陽科技大學資訊工程系，熱衷於探索新科技與開發軟體。</p>
            </section>
            <section class="card">
                <h2>🎨 興趣專長</h2>
                <p>專長：C/C++ 基礎、Python 程式設計。<br>興趣： 騎車、打 Game、羽球。</p>
            </section>
        </main>
    </div>

    <div class="mobile-view">
        <header>
            <h1>我的名片 (手機版)</h1>
        </header>
        
        <div class="tab-menu">
            <button onclick="switchTab('intro')">個人簡介</button>
            <button onclick="switchTab('skills')">興趣專長</button>
        </div>

        <div id="intro" class="content-box">
            <h3>👤 個人簡介</h3>
            <p>我是李塬閎。目前就讀於朝陽科技大學資訊工程系，熱衷於探索新科技與開發軟體。</p>
        </div>

        <div id="skills" class="content-box" style="display:none;">
            <h3>🎨 興趣專長</h3>
            <ul>
                <li>專長：C/C++ 基礎、Python 程式設計。</li>
                <li>興趣： 騎車、打 Game、羽球。</li>
            </ul>
        </div>
    </div>

    <script>
        // 手機版切換邏輯
        function switchTab(tabId) {
            // 先隱藏所有內容
            document.querySelectorAll('.content-box').forEach(el => {
                el.style.display = 'none';
            });
            // 顯示點選的內容
            document.getElementById(tabId).style.display = 'block';
        }
    </script>
</body>
</html>
