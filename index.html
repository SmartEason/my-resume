<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李塬閎的個人網頁</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desktop-view">
        <div class="hero">
            <h1>李塬閎的專業資訊 (電腦端)</h1>
            <p>朝陽科技大學資訊工程系</p>
        </div>
        <div class="desktop-content">
            <section>
                <h2>👤 個人簡介</h2>
                <p>我是李塬閎。目前就讀於朝陽科技大學資訊工程系，熱衷於探索新科技與開發軟體。</p>
            </section>
            <section>
                <h2>🎨 興趣專長</h2>
                <p><strong>專長：</strong>C/C++ 基礎、Python 程式設計</p>
                <p><strong>興趣：</strong>騎車、打 Game、羽球</p>
            </section>
        </div>
    </div>

    <div class="mobile-view">
        <div class="mobile-header">
            <h2>塬閎的手機名片</h2>
        </div>
        
        <div class="tabs">
            <button onclick="show('intro')">個人簡介</button>
            <button onclick="show('skills')">興趣專長</button>
        </div>

        <div id="intro" class="mobile-box">
            <p>我是李塬閎。就讀於朝陽資工系，熱衷於探索新科技與開發軟體。這是我的簡介。</p>
        </div>

        <div id="skills" class="mobile-box" style="display:none;">
            <ul>
                <li><strong>專長：</strong>C/C++ 基礎、Python</li>
                <li><strong>興趣：</strong>騎車、打 Game、羽球</li>
            </ul>
        </div>
    </div>

    <script>
        // 手機端的切換按鈕邏輯
        function show(id) {
            document.querySelectorAll('.mobile-box').forEach(b => b.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
